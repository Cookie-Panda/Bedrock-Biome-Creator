        function renderField(compKey, field, value, isClient, arrayIndex = null) {
            const biome = getCurrentBiome();
            const dataAttrs = `data-component="${compKey}" data-field="${field.id}" ${arrayIndex !== null ? `data-index="${arrayIndex}"` : ''} data-type="${field.type}" data-is-client="${isClient}"`;
            
            if (field.type === 'noise_specifiers') {
                // Ensure default exists in actual data to prevent UI/JSON desync
                if (!biome.data[compKey][field.id]) {
                    biome.data[compKey][field.id] = field.default ? JSON.parse(JSON.stringify(field.default)) : [ { block: "minecraft:stone", min: 0.0, max: 1.0 } ];
                }
                const items = biome.data[compKey][field.id];
                let html = `<div class="form-group full-width"><label style="border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-bottom: 10px;">${field.label}</label>`;

                items.forEach((item, idx) => {
                    html += `
                    <div class="array-item" style="padding-top: 35px;">
                        <button type="button" class="btn-standard danger array-remove-btn" onclick="removeNoiseSpecifier('${compKey}', '${field.id}', ${idx})">Remove</button>
                        <div class="form-grid" style="grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px;">
                            <div><label>Block</label><input type="text" value="${item.block || ''}" oninput="updateNoiseSpecifier('${compKey}', '${field.id}', ${idx}, 'block', this.value)"></div>
                            <div><label>Noise ID (Opt)</label><input type="text" value="${item.noise || ''}" oninput="updateNoiseSpecifier('${compKey}', '${field.id}', ${idx}, 'noise', this.value)"></div>
                            <div><label>Threshold (Opt)</label><input type="number" step="0.01" value="${item.threshold !== undefined ? item.threshold : ''}" oninput="updateNoiseSpecifier('${compKey}', '${field.id}', ${idx}, 'threshold', this.value)"></div>
                            <div><label>Range Min (Opt)</label><input type="number" step="0.01" value="${item.min !== undefined ? item.min : ''}" oninput="updateNoiseSpecifier('${compKey}', '${field.id}', ${idx}, 'min', this.value)"></div>
                            <div><label>Range Max (Opt)</label><input type="number" step="0.01" value="${item.max !== undefined ? item.max : ''}" oninput="updateNoiseSpecifier('${compKey}', '${field.id}', ${idx}, 'max', this.value)"></div>
                        </div>
                    </div>`;
                });
                html += `<button type="button" class="btn-standard" onclick="addNoiseSpecifier('${compKey}', '${field.id}')">+ Add Specifier</button></div>`;
                return html;
            }

            let html = `<div class="form-group ${field.type === 'textarea' || (field.type === 'text' && field.id === 'targets') || field.id === 'non_replaceable_blocks' ? 'full-width' : ''}">`;
            if (field.type === 'checkbox') {
                html += `<label class="checkbox-label"><input type="checkbox" ${dataAttrs} ${value ? 'checked' : ''}><span>${field.label}</span></label>`;
            } else if (field.type === 'select') {
                html += `<label>${field.label}</label><select ${dataAttrs}>`;
                field.options.forEach(opt => { html += `<option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>`; });
                html += `</select>`;
            } else if (field.type === 'textarea') {
                html += `<label>${field.label}</label><textarea ${dataAttrs}>${value}</textarea>`;
            } else {
                html += `<label>${field.label}</label><input type="${field.type}" ${field.step ? `step="${field.step}"` : ''} ${field.placeholder ? `placeholder="${field.placeholder}"` : ''} ${dataAttrs} value="${value}">`;
            }
            html += `</div>`;
            return html;
        }

        // --- Custom Nested Handlers ---
        function addNoiseSpecifier(compKey, fieldId) { 
            const biome = getCurrentBiome(); if(!biome) return;
            if (!biome.data[compKey][fieldId]) biome.data[compKey][fieldId] = [];
            biome.data[compKey][fieldId].push({ block: "minecraft:stone", min: 0.0, max: 1.0 }); 
            syncProject(); renderForm(); generateJSONDOM(); 
        }

        function removeNoiseSpecifier(compKey, fieldId, idx) { 
            const biome = getCurrentBiome(); if(!biome) return;
            if (!biome.data[compKey][fieldId]) return;
            biome.data[compKey][fieldId].splice(idx, 1); 
            syncProject(); renderForm(); generateJSONDOM(); 
        }
        function updateNoiseSpecifier(compKey, fieldId, idx, prop, val) {
            const biome = getCurrentBiome(); if(!biome) return;
            if (prop === 'threshold' || prop === 'min' || prop === 'max') val = val === "" ? "" : parseFloat(val);
            if (!biome.data[compKey][fieldId]) biome.data[compKey][fieldId] = [];
            if (!biome.data[compKey][fieldId][idx]) biome.data[compKey][fieldId][idx] = {};
            biome.data[compKey][fieldId][idx][prop] = val; 
            syncProject(); generateJSONDOM(); 
        }


        // --- Custom Color Picker Setup ---
        function initCustomColorPickers() {
            // Find all color inputs that haven't been overridden yet
            document.querySelectorAll('input[type="color"]:not(.pickr-processed)').forEach(input => {
                input.classList.add('pickr-processed');
                
                // Hide the native input but keep it in the DOM for your data syncing
                input.style.display = 'none'; 

                // Create a container for Pickr next to the hidden input
                const pickrContainer = document.createElement('div');
                input.parentNode.insertBefore(pickrContainer, input.nextSibling);

                // Initialize Pickr
                const pickr = Pickr.create({
                    el: pickrContainer,
                    theme: 'monolith',
                    default: input.value || '#000000',
                    components: {
                        preview: true,
                        opacity: false, // Disables alpha/transparency
                        hue: true,
                        interaction: {
                            hex: false,
                            rgba: false,
                            hsla: false,
                            hsva: false,
                            cmyk: false,
                            input: true, // Allows typing hex directly
                            clear: false,
                            save: true
                        }
                    }
                });

                // Helper to enforce strict 6-digit hex (e.g., prevents #fff)
                const getStrictHex = (color) => {
                    let hex = color.toHEXA().toString();
                    if (hex.length === 4) {
                        hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
                    }
                    return hex.toUpperCase();
                };

                // Sync Pickr changes back to your hidden input
                pickr.on('save', (color, instance) => {
                    input.value = getStrictHex(color);
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                    input.dispatchEvent(new Event('change', { bubbles: true }));
                    instance.hide();
                }).on('change', (color) => {
                    input.value = getStrictHex(color);
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                });
            });
        }


        // --- Generic Handlers ---
        function handleFormChange(e) {
            const t = e.target;
            if (!t.hasAttribute('data-field')) return;

            const biome = getCurrentBiome();
            if(!biome) return;

            const comp = t.getAttribute('data-component');
            const field = t.getAttribute('data-field');
            const type = t.getAttribute('data-type') || t.type;
            const isClient = t.getAttribute('data-is-client') === 'true';
            const isArrayItem = t.hasAttribute('data-index');
            
            let val = t.value;
            if (type === 'checkbox') val = t.checked;
            if (type === 'number') val = parseFloat(val) || 0;

            if (comp === 'root') {
                if (field === 'identifier') {
                    biome.identifier = val;
                    renderTabs();
                    renderComponents(); // Update vanilla toggle states dynamically
                } else if (field === 'format_version') {

                    biome.format_version = val;
                }
            } else if (isArrayItem) {
                const tgt = isClient ? biome.clientData : biome.data;
                tgt[comp][parseInt(t.getAttribute('data-index'))][field] = val;
            } else {
                const tgt = isClient ? biome.clientData : biome.data;
                tgt[comp][field] = val;
                if (!isClient && field === 'type' && serverSchema[comp].subFields) {
                    if (serverSchema[comp].subFields[val]) {
                        serverSchema[comp].subFields[val].forEach(f => {
                            if (tgt[comp][f.id] === undefined) {
                                tgt[comp][f.id] = Array.isArray(f.default) ? JSON.parse(JSON.stringify(f.default)) : f.default;
                            }
                        });
                    }
                    renderForm();
                }
            }
            syncProject();
            generateJSONDOM();
        }


        function addArrayItem(compKey, isClient) { 
            const biome = getCurrentBiome(); if(!biome) return;
            const schema = isClient ? clientSchema[compKey] : serverSchema[compKey];
            const tgt = isClient ? biome.clientData : biome.data;
            tgt[compKey].push({...schema.arrayConfig.itemTemplate}); 
            syncProject(); renderForm(); generateJSONDOM(); 
        }
        function removeArrayItem(compKey, index, isClient) { 
            const biome = getCurrentBiome(); if(!biome) return;
            const tgt = isClient ? biome.clientData : biome.data;
            tgt[compKey].splice(index, 1); 
            syncProject(); renderForm(); generateJSONDOM(); 
        }

        function safeJSONParse(str, fallback) { if (!str) return fallback; try { return JSON.parse(str); } catch (e) { return fallback; } }

        function getBiomeJSONStrings(biome) {
            if (!biome) return { server: "", client: "" };

            // SERVER JSON
            const serverBiomeDef = { description: { identifier: biome.identifier || "custom:unnamed" }, components: {} };

            biome.activeComponents.forEach(comp => {
                const data = biome.data[comp];
                switch(comp) {
                    case 'minecraft:replace_biomes':
                        serverBiomeDef.components[comp] = {
                            replacements: data.map(r => ({
                                amount: r.amount, dimension: r.dimension, noise_frequency_scale: r.noise_frequency_scale,
                                targets: typeof r.targets === 'string' ? r.targets.split(',').map(s => s.trim()).filter(s => s) : r.targets
                            }))
                        }; break;
                    
                    case 'minecraft:surface_builder':
                    case 'minecraft:subsurface_builder':
                        const bType = data.type;
                        let builderObj = { type: bType };
                        if (bType === 'minecraft:noise_gradient') {
                            builderObj.noise_descriptor = {
                                name: data.nd_name || "minecraft:custom_noise",
                                first_octave: parseFloat(data.nd_first_octave) || -4,
                                amplitudes: (data.nd_amplitudes || "").split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n))
                            };
                            const nonRep = (data.non_replaceable_blocks || "").split(',').map(s => s.trim()).filter(s => s);
                            if (nonRep.length > 0) builderObj.non_replaceable_blocks = nonRep;
                            
                            builderObj.noise_block_specifiers = (data.noise_block_specifiers || []).map(spec => {
                                const out = { block: spec.block || "minecraft:stone" };
                                if (spec.noise && spec.noise.trim() !== "") out.noise = spec.noise;
                                if (spec.threshold !== undefined && spec.threshold !== "") out.threshold = spec.threshold;
                                if (spec.min !== undefined && spec.min !== "" && spec.max !== undefined && spec.max !== "") {
                                    out.range = { min: spec.min, max: spec.max };
                                }
                                return out;
                            });
                        } else {
                            const subFields = serverSchema[comp].subFields[bType] || [];
                            subFields.forEach(f => {
                                if (f.id === 'ceiling_materials' || f.id === 'floor_materials') {
                                    builderObj[f.id] = typeof data[f.id] === 'string' ? data[f.id].split(',').map(s => s.trim()).filter(s => s) : [];
                                } else if (data[f.id] !== "" && data[f.id] !== undefined) builderObj[f.id] = data[f.id];
                            });
                        }

                        serverBiomeDef.components[comp] = { builder: builderObj }; break;
                    
                    case 'minecraft:climate':
                        serverBiomeDef.components[comp] = { temperature: data.temperature, downfall: data.downfall };
                        if(data.snow_accumulation_min !== undefined || data.snow_accumulation_max !== undefined) {
                            serverBiomeDef.components[comp].snow_accumulation = [data.snow_accumulation_min, data.snow_accumulation_max];
                        } break;
                        
                    case 'minecraft:tags':
                        serverBiomeDef.components[comp] = { tags: typeof data.tags === 'string' ? data.tags.split(',').map(s => s.trim()).filter(s => s) : [] }; break;
                        
                    case 'minecraft:map_tints':
                        serverBiomeDef.components[comp] = { foliage: data.foliage, grass: data.grass_type === 'tint' ? { type: "tint", tint: data.grass_tint } : { type: "noise" } }; break;
                        
                    case 'minecraft:mountain_parameters':
                        serverBiomeDef.components[comp] = {};
                        if (data.steep_material && data.steep_material.trim() !== "") {
                            serverBiomeDef.components[comp].steep_material_adjustment = {
                                east_slopes: data.steep_material_east, north_slopes: data.steep_material_north,
                                south_slopes: data.steep_material_south, west_slopes: data.steep_material_west, material: data.steep_material
                            };
                        }
                        serverBiomeDef.components[comp].top_slide = { enabled: data.top_slide_enabled }; break;
                        
                    case 'minecraft:surface_material_adjustments':
                        serverBiomeDef.components[comp] = {
                            adjustments: data.map(adj => {
                                const adjObj = {};
                                if (adj.height_range_min != null && adj.height_range_max != null && adj.height_range_min !== "" && adj.height_range_max !== "") {
                                    const minH = isNaN(adj.height_range_min) ? adj.height_range_min : parseFloat(adj.height_range_min);
                                    const maxH = isNaN(adj.height_range_max) ? adj.height_range_max : parseFloat(adj.height_range_max);
                                    adjObj.height_range = [minH, maxH];
                                }
                                const materials = {};
                                if (adj.top_material) materials.top_material = adj.top_material;
                                if (adj.mid_material) materials.mid_material = adj.mid_material;
                                if (adj.foundation_material) materials.foundation_material = adj.foundation_material;
                                if (adj.sea_material) materials.sea_material = adj.sea_material;
                                if (adj.sea_floor_material) materials.sea_floor_material = adj.sea_floor_material;
                                adjObj.materials = materials;

                                if (adj.noise_frequency_scale != null && adj.noise_frequency_scale !== "") adjObj.noise_frequency_scale = parseFloat(adj.noise_frequency_scale) || 0;
                                if (adj.noise_range_min != null && adj.noise_range_max != null && adj.noise_range_min !== "" && adj.noise_range_max !== "") {
                                    adjObj.noise_range = [parseFloat(adj.noise_range_min) || 0, parseFloat(adj.noise_range_max) || 0];
                                }
                                return adjObj;
                            })
                        }; break;
                        
                    case 'minecraft:creature_spawn_probability':
                    case 'minecraft:humidity':
                    case 'minecraft:village_type':
                        serverBiomeDef.components[comp] = { ...data }; break;
                        
                    case 'minecraft:partially_frozen':
                        serverBiomeDef.components[comp] = {}; break;
                }
            });

            const serverOut = { format_version: biome.format_version || "1.26.30", "minecraft:biome": serverBiomeDef };
            const serverStr = JSON.stringify(serverOut, null, 2);

            // CLIENT JSON
            const clientBiomeDef = { description: { identifier: biome.identifier || "custom:unnamed" }, components: {} };
            biome.clientActiveComponents.forEach(comp => {
                const data = biome.clientData[comp];
                switch(comp) {
                      case 'minecraft:sky_color':
                        clientBiomeDef.components[comp] = { sky_color: data.sky_color || "#78A7FF" }; break;
                    case 'minecraft:dry_foliage_color':
                        clientBiomeDef.components[comp] = { color: data.color || "#4C763C" }; break;
                    case 'minecraft:foliage_appearance':
                        clientBiomeDef.components[comp] = { color: data.color_type === 'colormap' ? { color_map: data.color_map } : data.color }; break;
                    case 'minecraft:grass_appearance':
                        clientBiomeDef.components[comp] = { color: data.color_type === 'colormap' ? { color_map: data.color_map } : data.color, grass_is_shaded: data.grass_is_shaded }; break;

                    case 'minecraft:water_appearance':
                        clientBiomeDef.components[comp] = { surface_color: data.surface_color, surface_opacity: data.surface_opacity }; break;
                    case 'minecraft:fog_appearance':
                    case 'minecraft:atmosphere_identifier':
                    case 'minecraft:color_grading_identifier':
                    case 'minecraft:cubemap_identifier':
                    case 'minecraft:lighting_identifier':
                    case 'minecraft:water_identifier':
                        clientBiomeDef.components[comp] = { [comp.replace('minecraft:', '')]: data[comp.replace('minecraft:', '')] }; break;
                    case 'minecraft:biome_music':
                        clientBiomeDef.components[comp] = { music_definition: data.music_definition, volume_multiplier: data.volume_multiplier, underwater_music: data.underwater_music }; break;
                    case 'minecraft:precipitation':
                    if (data.type && data.type !== 'none') clientBiomeDef.components[comp] = {
                        [data.type]: parseFloat(data.density) || 0 };
                    else clientBiomeDef.components[comp] = {};
                    break;
                    case 'minecraft:ambient_sounds':
                        const out = {};
                        if (data.addition) out.addition = { asset: data.addition, chance: data.addition_chance };
                        if (data.underwater_addition) out.underwater_addition = { asset: data.underwater_addition, chance: data.underwater_addition_chance };
                        if (data.loop) out.loop = data.loop; if (data.mood) out.mood = data.mood;
                        if (data.underwater_loop) out.underwater_loop = data.underwater_loop; if (data.underwater_mood) out.underwater_mood = data.underwater_mood;
                        clientBiomeDef.components[comp] = out; break;
                }
            });

            const clientOut = { format_version: "1.21.130", "minecraft:client_biome": clientBiomeDef };
            const clientStr = JSON.stringify(clientOut, null, 2);

            return { server: serverStr, client: clientStr };
        }

        function generateJSONDOM() {
            const strings = getBiomeJSONStrings(getCurrentBiome());
            
            const serverEl = document.getElementById('json-output-server');
            serverEl.textContent = strings.server; delete serverEl.dataset.highlighted; hljs.highlightElement(serverEl);

            const clientEl = document.getElementById('json-output-client');
            clientEl.textContent = strings.client; delete clientEl.dataset.highlighted; hljs.highlightElement(clientEl);
        }

        // --- Output Helpers (Individual Biomes) ---
        function showToast(msg = "Copied to clipboard!") {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = "toast show";
            setTimeout(() => { t.className = "toast"; }, 2500);
        }

        async function pasteJSON() {
            try {
                // Read text directly from the clipboard
                const text = await navigator.clipboard.readText();
                if (!text) {
                    showToast("Clipboard is empty!");
                    return;
                }
                
                // Safely strip comments (// and /* */) just like the file importer
                const cleanData = text.replace(/\\"|"(?:\\"|[^"])*"|(\/\/.*|\/\*[\s\S]*?\*\/)/g, (m, g) => g ? "" : m);
                
                // Parse and process
                const parsed = JSON.parse(cleanData);
                processImport(parsed);
                
            } catch (err) {
                console.error("Paste Error:", err);
                showToast("Invalid JSON or Clipboard access denied");
            }
        }

        function copyJSON(type) {
            const strings = getBiomeJSONStrings(getCurrentBiome());
            const str = type === 'server' ? strings.server : strings.client;
            if(!str) return;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(str).then(() => showToast());
            } else {
                const ta = document.createElement("textarea"); ta.value = str; ta.style.position = "fixed"; ta.style.left = "-9999px";
                document.body.appendChild(ta); ta.focus(); ta.select();
                try { document.execCommand('copy'); showToast(); } catch(e) {}
                document.body.removeChild(ta);
            }
        }

        function downloadJSON(type) {
            const biome = getCurrentBiome();
            if(!biome) return;
            const strings = getBiomeJSONStrings(biome);
            const str = type === 'server' ? strings.server : strings.client;
            if(!str) return;
            
            const blob = new Blob([str], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            let name = biome.identifier.replace(':', '_');
            if (type === 'server') name += ".biome.json";
            if (type === 'client') name += ".client_biome.json";
            
            const a = document.createElement('a'); a.href = url; a.download = name;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        // --- Pack Exporting Logic ---
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function generatePackIcon() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#282a36';
            ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = '#bd93f9';
            ctx.font = 'bold 80px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('B', 64, 64);
            return canvas.toDataURL('image/png').split(',')[1]; // Return base64 data only
        }

        function openExportModal(projId = null, event = null) {
            if (event) event.stopPropagation();
            
            exportProjectTargetId = projId || currentProjectId;
            const proj = projects.find(p => p.id === exportProjectTargetId);
            if (!proj) return;

            document.getElementById('export-pack-name').value = proj.name;
            
            // Calculate and display the next version automatically
            let displayVersion = proj.version ? [...proj.version] : [1, 0, 0];
            if (proj.hasBeenExported) {
                displayVersion[2] += 1; // Pre-increment the patch version for the UI
            }
            document.getElementById('export-pack-version').value = displayVersion.join('.');
            
            const list = document.getElementById('export-biome-list');


            list.innerHTML = "";
            proj.biomes.forEach(b => {
                list.innerHTML += `
                    <label>
                        <input type="checkbox" data-biome-id="${b.id}" checked>
                        <span>${b.identifier}</span>
                    </label>
                `;
            });
            
            document.getElementById('modal-overlay-export').classList.add('active');
        }

        function performExport() {
            const proj = projects.find(p => p.id === exportProjectTargetId);
            if (!proj) return;

            const packName = document.getElementById('export-pack-name').value.trim() || proj.name;
            const packDesc = document.getElementById('export-pack-desc').value.trim() || "Created with Bedrock Biome Creator";
            
            let versionArr = document.getElementById('export-pack-version').value.split('.').map(Number);
            if (versionArr.length !== 3) versionArr = [1, 0, 0];
            
            // Save the version exactly as shown in the UI to the project state
            proj.version = versionArr;
            proj.hasBeenExported = true;


            const minEngineArr = document.getElementById('export-min-engine').value.split('.').map(Number);
            const engine = minEngineArr.length === 3 ? minEngineArr : [1, 26, 30];

            const checkboxes = document.querySelectorAll('#export-biome-list input[type="checkbox"]:checked');
            const selectedBiomeIds = Array.from(checkboxes).map(cb => cb.getAttribute('data-biome-id'));
            
            if (selectedBiomeIds.length === 0) {
                alert("Please select at least one biome to export.");
                return;
            }

            // --- Fix duplicate identifiers to prevent export conflicts ---
            const idCounts = {};
            let changedIdentifiers = false;
            proj.biomes.forEach(b => {
                if (selectedBiomeIds.includes(b.id)) {
                    if (idCounts[b.identifier]) {
                        const randomSuffix = Math.random().toString(36).substr(2, 2); // generates 'ab', 'f3', etc.
                        b.identifier = `${b.identifier}_${randomSuffix}`;
                        idCounts[b.identifier] = true;
                        changedIdentifiers = true;
                    } else {
                        idCounts[b.identifier] = true;
                    }
                }
            });
            
            // Update the live UI so the user sees the corrected names in their tabs
            if (changedIdentifiers && currentProjectId === proj.id) {
                currentProject = JSON.parse(JSON.stringify(proj));
                renderTabs(); renderForm(); generateJSONDOM();
            }
            // -------------------------------------------------------------

            // (Any warning alerts or persistent UUID logic you have will be right below this)


            // Warn if replace_biomes is missing from any selected biome
            const missingReplace = proj.biomes.filter(b => selectedBiomeIds.includes(b.id) && !b.activeComponents.includes('minecraft:replace_biomes'));
            if (missingReplace.length > 0) {
                const names = missingReplace.map(b => b.identifier).join("\n- ");
                const proceed = confirm(`ALERT: The following biomes are missing the 'replace_biomes' component:\n\n- ${names}\n\nWithout it, they won't generate in-game. Please activate it unless you are intentionally overriding vanilla visuals only.\n\nDo you want to proceed with the export anyway?`);
                if (!proceed) return;
            }

            // Lock in persistent UUIDs for this project if they don't exist yet
            if (!proj.uuids) {
                proj.uuids = {
                    bp: generateUUID(),
                    rp: generateUUID(),
                    bpModule: generateUUID(),
                    rpModule: generateUUID()
                };
            }
            
            // Save project updates (UUIDs and incremented version) to local storage
            const projIndex = projects.findIndex(p => p.id === proj.id);
            if (projIndex > -1) {
                projects[projIndex] = proj;
                saveLocalData();
            }

            closeModal('modal-overlay-export');
            showToast("Generating Addon...");

            const bpUUID = proj.uuids.bp;
            const rpUUID = proj.uuids.rp;
            const bpModuleUUID = proj.uuids.bpModule;
            const rpModuleUUID = proj.uuids.rpModule;
            const ver = proj.version;

            const bpManifest = {
                format_version: 2,
                header: { name: packName + " BP", description: packDesc, uuid: bpUUID, version: ver, min_engine_version: engine },
                modules: [{ type: "data", uuid: bpModuleUUID, version: ver }],
                dependencies: [{ uuid: rpUUID, version: ver }]
            };

            const rpManifest = {
                format_version: 2,
                header: { name: packName + " RP", description: packDesc, uuid: rpUUID, version: ver, min_engine_version: engine },
                modules: [{ type: "resources", uuid: rpModuleUUID, version: ver }],
                dependencies: [{ uuid: bpUUID, version: ver }]
            };

            const zip = new JSZip();
            const bpFolder = zip.folder(packName + " BP");
            const rpFolder = zip.folder(packName + " RP");
            
            const iconBase64 = generatePackIcon();

            // BP contents
            bpFolder.file("manifest.json", JSON.stringify(bpManifest, null, 2));
            bpFolder.file("pack_icon.png", iconBase64, {base64: true});
            const bpBiomesFolder = bpFolder.folder("biomes");

            // RP contents
            rpFolder.file("manifest.json", JSON.stringify(rpManifest, null, 2));
            rpFolder.file("pack_icon.png", iconBase64, {base64: true});
            const rpBiomesFolder = rpFolder.folder("biomes");

            // Add biomes
            selectedBiomeIds.forEach(id => {
                const b = proj.biomes.find(x => x.id === id);
                if (b) {
                    const strings = getBiomeJSONStrings(b);
                    const safeName = b.identifier.replace(':', '_');
                    
                    bpBiomesFolder.file(`${safeName}.biome.json`, strings.server);
                    rpBiomesFolder.file(`${safeName}.client_biome.json`, strings.client);
                }
            });

            zip.generateAsync({type:"blob"}).then(function(content) {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${packName.replace(/[^a-z0-9]/gi, '_')}.mcaddon`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast("Addon Exported!");
            });
        }

        document.addEventListener("DOMContentLoaded", initApp);
    </script>
    
</body>
